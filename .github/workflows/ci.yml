name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly SEC schema-drift probe. Mondays 14:00 UTC (09:00 ET) —
    # after SEC's overnight feed refresh, before the US workday.
    - cron: "0 14 * * 1"

# Coverage thresholds (Phase 3). coverage-check fails if any bucket drops
# below its floor. Raise these over time; never lower without discussion.
env:
  COV_SERVICES_MIN: "80"
  COV_CELERY_MIN: "80"
  COV_ROUTES_MIN: "70"
  COV_SCRIPTS_MIN: "60"

jobs:
  backend:
    name: Backend — lint + type + pytest
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: secadv
          POSTGRES_PASSWORD: secadv
          POSTGRES_DB: secadv
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U secadv"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

      elasticsearch:
        image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
        env:
          discovery.type: single-node
          xpack.security.enabled: "false"
          ES_JAVA_OPTS: "-Xms512m -Xmx512m"
        ports:
          - 9200:9200
        options: >-
          --health-cmd "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 20

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      # conftest.py forces DATABASE_URL to the test DB; setting TEST_DATABASE_URL
      # pins the host to the GitHub service network.
      TEST_DATABASE_URL: postgresql://secadv:secadv@localhost:5432/secadv_test
      ELASTICSEARCH_URL: http://localhost:9200
      REDIS_URL: redis://localhost:6379/0
      SECRET_KEY: ci-secret-key-not-for-production
      DATABASE_URL: postgresql://secadv:secadv@localhost:5432/secadv
      PYTHONPATH: ${{ github.workspace }}/api

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Wait for Postgres
        run: |
          for i in $(seq 1 30); do
            pg_isready -h localhost -U secadv && exit 0
            sleep 2
          done
          echo "Postgres never became ready"; exit 1

      - name: Run Alembic migrations (main DB)
        # Provides a schema for anything that doesn't use the conftest fixtures.
        run: alembic upgrade head

      - name: Lint with ruff
        run: ruff check api scripts tests

      - name: Type check with mypy
        # Keep permissive initially: ignore missing imports, don't enforce strict.
        # Tighten over time as typing debt gets paid down.
        run: |
          mypy api scripts \
            --ignore-missing-imports \
            --install-types --non-interactive \
            --disable-error-code=annotation-unchecked \
            || true

      - name: Run pytest with coverage
        run: |
          pytest tests/ -v \
            --cov=api --cov=scripts \
            --cov-report=xml \
            --cov-report=term \
            --maxfail=10

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  frontend:
    name: Frontend — lint + test + build
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Lint
        # Allow failure while the lint baseline is still being stabilized.
        run: npm run lint || true

      - name: Test (Vitest)
        run: |
          if [ -f vitest.config.ts ] || [ -f vitest.config.js ]; then
            npm test
          else
            echo "Vitest not configured yet — skipping."
          fi

      - name: Build
        run: npm run build

  coverage-check:
    name: Coverage thresholds
    if: github.event_name != 'schedule'
    needs: backend
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml

      - name: Enforce per-bucket thresholds
        run: python scripts/check_coverage.py coverage.xml
        env:
          COV_SERVICES_MIN: ${{ env.COV_SERVICES_MIN }}
          COV_CELERY_MIN: ${{ env.COV_CELERY_MIN }}
          COV_ROUTES_MIN: ${{ env.COV_ROUTES_MIN }}
          COV_SCRIPTS_MIN: ${{ env.COV_SCRIPTS_MIN }}

  smoke-install:
    name: Fresh-clone install smoke
    if: github.event_name != 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Bootstrap .env from .env.example
        run: |
          cp .env.example .env
          # SECRET_KEY guard in Makefile warns but doesn't block; set a real
          # one so the warning doesn't clutter logs.
          sed -i 's/^SECRET_KEY=.*/SECRET_KEY=ci-smoke-secret-key-not-for-production/' .env

      - name: make install (up + wait for health)
        run: make install

      - name: make verify (five-check readiness table)
        run: make verify

      - name: make test (full pytest suite inside containers)
        run: make test

      - name: Dump logs on failure
        if: failure()
        run: docker compose logs --no-color --tail 400

      - name: Tear down
        if: always()
        run: docker compose down -v

  sec-schema-drift:
    name: SEC bulk CSV schema drift (weekly)
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: secadv
          POSTGRES_PASSWORD: secadv
          POSTGRES_DB: secadv
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U secadv"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://secadv:secadv@localhost:5432/secadv
      SECRET_KEY: ci-schema-drift-not-for-production
      PYTHONPATH: ${{ github.workspace }}/api
      # Narrow probe window so the job stays well under 30 minutes and
      # we don't hammer the SEC endpoints with a full historical pull.
      SCHEMA_DRIFT_PROBE: "1"
      SCHEMA_DRIFT_MONTHS: "1"

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run Alembic migrations
        run: alembic upgrade head

      - name: Probe SEC endpoints (narrow window)
        run: python scripts/probe_sec_schema.py --months "$SCHEMA_DRIFT_MONTHS"

      - name: Notify on failure
        if: failure()
        run: |
          echo "::error::SEC schema drift probe failed — column names or URL patterns may have changed."
          echo "Inspect the logs above and update scripts/load_filing_data.py / load_bulk_csv.py accordingly."
