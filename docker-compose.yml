services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-secadv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secadv}
      POSTGRES_DB: ${POSTGRES_DB:-secadv}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-secadv}"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/data
      - ./api:/project/api
      - ./alembic:/project/alembic
      - ./tests:/project/tests
      - ./scripts:/project/scripts
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "cd /project/api && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 6
      start_period: 60s

  celery_worker:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      - .env
    environment:
      - PYTHONPATH=/project/api
    volumes:
      - ./data:/data
      - ./api:/project/api
      - ./scripts:/project/scripts
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "cd /project/api && celery -A celery_tasks.app worker --loglevel=info -Q match,celery,dead_letter"]
    healthcheck:
      test: ["CMD-SHELL", "celery -A celery_tasks.app inspect ping -d celery@$$HOSTNAME --timeout=5 > /dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 45s

  celery_beat:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      - .env
    environment:
      - PYTHONPATH=/project/api
    volumes:
      - ./data:/data
      - ./api:/project/api
      - ./scripts:/project/scripts
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["sh", "-c", "cd /project/api && celery -A celery_tasks.app beat --loglevel=info --schedule=/tmp/celerybeat-schedule"]
    healthcheck:
      # Beat writes /tmp/celerybeat-schedule and touches it on every tick.
      # Fail if the file is older than 120s (scheduler tick is 60s).
      test: ["CMD-SHELL", "test $$(( $$(date +%s) - $$(stat -c %Y /tmp/celerybeat-schedule 2>/dev/null || echo 0) )) -lt 120 || exit 1"]
      interval: 60s
      timeout: 5s
      retries: 3
      start_period: 60s

volumes:
  postgres_data:
  es_data:
