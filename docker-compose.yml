services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-secadv}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secadv}
      POSTGRES_DB: ${POSTGRES_DB:-secadv}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-secadv}"]
      interval: 10s
      timeout: 5s
      retries: 5

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.13.0
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health | grep -qv '\"status\":\"red\"'"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/data
      - ./api:/project/api
      - ./alembic:/project/alembic
      - ./tests:/project/tests
      - ./scripts:/project/scripts
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "cd /project/api && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  celery_worker:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      - .env
    environment:
      - PYTHONPATH=/project/api
    volumes:
      - ./data:/data
      - ./api:/project/api
      - ./scripts:/project/scripts
    depends_on:
      postgres:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "cd /project/api && celery -A celery_tasks.app worker --loglevel=info"

  celery_beat:
    build:
      context: .
      dockerfile: api/Dockerfile
    env_file:
      - .env
    environment:
      - PYTHONPATH=/project/api
    volumes:
      - ./data:/data
      - ./api:/project/api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: sh -c "cd /project/api && celery -A celery_tasks.app beat --loglevel=info"

volumes:
  postgres_data:
  es_data:
